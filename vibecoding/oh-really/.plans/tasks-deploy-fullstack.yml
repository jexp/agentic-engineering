      media.
    status: pending
    dependencies:
      - task-007
      - task-009
    acceptance_criteria:
      - "Page renders the meme image, title, and creator"
      - "Unknown meme ID shows a 404 page"
      - "Open Graph `og:image` meta tag points to the S3 image URL"
      - "Page is server-rendered (uses Next.js `generateMetadata`) for correct social previews"
    completed_at: null


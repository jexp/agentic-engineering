<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WikiLinks</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f1f3f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
    }

    .wordmark {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a73e8;
      white-space: nowrap;
      letter-spacing: -.4px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      flex: 1;
    }

    #url-input {
      flex: 1;
      min-width: 0;
      padding: 7px 12px;
      font-size: 13px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      color: #202124;
    }
    #url-input:focus  { border-color: #1a73e8; box-shadow: 0 0 0 2px #d2e3fc; }
    #url-input.error  { border-color: #d93025; box-shadow: 0 0 0 2px #fce8e6; }

    #go-btn {
      padding: 7px 20px;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      background: #1a73e8;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    #go-btn:hover:not(:disabled) { background: #1765cc; }
    #go-btn:disabled { background: #bdc1c6; cursor: not-allowed; }

    /* ── Status bar ──────────────────────────────────────────────────────── */
    #status {
      padding: 3px 18px;
      font-size: 11px;
      color: #5f6368;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      min-height: 21px;
      flex-shrink: 0;
    }

    /* ── Graph area ──────────────────────────────────────────────────────── */
    #graph-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Edges */
    .edge {
      stroke: #c5cae9;
      stroke-width: 1.5;
      fill: none;
    }

    /* Nodes */
    .node { cursor: pointer; }
    .node circle {
      stroke-width: 2.5;
      transition: filter .12s;
    }
    .node:hover circle { filter: brightness(.88) drop-shadow(0 2px 4px rgba(0,0,0,.18)); }

    .node text {
      font-size: 9.5px;
      text-anchor: middle;
      pointer-events: none;
      user-select: none;
      fill: #3c4043;
    }

    /* ── Tooltip ─────────────────────────────────────────────────────────── */
    #tooltip {
      position: absolute;
      background: rgba(32,33,36,.9);
      color: #fff;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.45;
      max-width: 260px;
      word-break: break-word;
      pointer-events: none;
      display: none;
      z-index: 9;
    }

    /* ── Legend ──────────────────────────────────────────────────────────── */
    #legend {
      position: absolute;
      bottom: 14px;
      right: 14px;
      background: rgba(255,255,255,.96);
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 11px;
      color: #5f6368;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .leg { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
    .leg:last-child { margin-bottom: 0; }
    .dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,0,0,.12);
      flex-shrink: 0;
    }

    #hint {
      position: absolute;
      bottom: 14px;
      left: 14px;
      font-size: 10px;
      color: #9aa0a6;
    }
  </style>
</head>
<body>

<header>
  <span class="wordmark">WikiLinks</span>
  <div class="input-row">
    <input id="url-input" type="text"
      placeholder="https://en.wikipedia.org/wiki/Artificial_intelligence" />
    <button id="go-btn">Explore</button>
  </div>
</header>

<div id="status">Enter a Wikipedia page URL and click Explore.</div>

<div id="graph-wrap">
  <svg id="svg"></svg>

  <div id="legend">
    <div class="leg"><div class="dot" style="background:#1a73e8"></div>Center</div>
    <div class="leg"><div class="dot" style="background:#34a853"></div>Fetched</div>
    <div class="leg"><div class="dot" style="background:#bdc1c6"></div>Unfetched (click to expand)</div>
  </div>

  <div id="hint">Scroll / pinch to zoom · drag nodes · dbl-click to open page</div>
  <div id="tooltip"></div>
</div>

<script>
'use strict';

// ── Constants ──────────────────────────────────────────────────────────────────
const MAX_LINKS = 5;   // links per node
const NODE_R    = 22;  // node radius px

// ── State ──────────────────────────────────────────────────────────────────────
// pages   : Map<title, { url, displayTitle, links:string[], fetched:bool }>
// nodeMap : Map<title, d3NodeDatum>  — persists x/y across renders
const pages   = new Map();
const nodeMap = new Map();
let center    = null;  // title string of center node

// ── D3 handles ─────────────────────────────────────────────────────────────────
let sim, gRoot, edgeG, nodeG, W, H;

// ── Wikipedia fetch ────────────────────────────────────────────────────────────
// Uses the REST HTML API so link order matches reading order on the page.
// a[rel="mw:WikiLink"] = internal wiki links only.
async function fetchWikiPage(title) {
  const slug = encodeURIComponent(title.replace(/ /g, '_'));
  try {
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/html/${slug}`);
    if (!res.ok) return null;
    const html = await res.text();
    const doc  = new DOMParser().parseFromString(html, 'text/html');

    // Display title — prefer <h1>, fall back to raw title
    const displayTitle =
      doc.querySelector('h1')?.textContent?.trim() ||
      doc.querySelector('title')?.textContent?.replace(/ - Wikipedia.*/, '').trim() ||
      title;

    // Collect internal article links in reading order
    const links = [];
    const seen  = new Set([title]);

    for (const a of doc.querySelectorAll('a[rel="mw:WikiLink"]')) {
      const href = a.getAttribute('href') || '';
      if (href.includes('#')) continue;               // skip anchor fragments
      if (a.closest('table, .reflist, .navbox, .mbox, .hatnote, footer, nav'))
        continue;                                     // skip tables / navboxes

      const m = href.match(/^\.\/(.+)$/);
      if (!m) continue;

      const t = decodeURIComponent(m[1]).replace(/_/g, ' ');
      if (t.includes(':')) continue;                  // skip special namespaces
      if (seen.has(t)) continue;

      seen.add(t);
      links.push(t);
      if (links.length === MAX_LINKS) break;
    }

    return { displayTitle, links };
  } catch (e) {
    console.warn('fetchWikiPage failed:', title, e);
    return null;
  }
}

// ── Page store helpers ─────────────────────────────────────────────────────────
function ensurePage(title) {
  if (!pages.has(title)) {
    pages.set(title, {
      url:          `https://en.wikipedia.org/wiki/${encodeURIComponent(title.replace(/ /g, '_'))}`,
      displayTitle: title,
      links:        [],
      fetched:      false,
    });
  }
  return pages.get(title);
}

function getDatum(title) {
  if (!nodeMap.has(title)) nodeMap.set(title, { id: title });
  return nodeMap.get(title);
}

// ── Graph init (called once per Explore, or on first load) ─────────────────────
function initGraph() {
  const wrap = document.getElementById('graph-wrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;

  const svg = d3.select('#svg');
  svg.selectAll('*').remove();

  // Arrow-head marker
  svg.append('defs').append('marker')
    .attr('id', 'arrow')
    .attr('viewBox', '0 -4 8 8')
    .attr('refX', NODE_R + 10).attr('refY', 0)
    .attr('markerWidth', 5).attr('markerHeight', 5)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-4L8,0L0,4').attr('fill', '#90a4ae');

  gRoot = svg.append('g');
  svg.call(d3.zoom().scaleExtent([.06, 12])
    .on('zoom', e => gRoot.attr('transform', e.transform)));

  edgeG = gRoot.append('g').attr('class', 'edges');
  nodeG = gRoot.append('g').attr('class', 'nodes');

  sim = d3.forceSimulation()
    .force('link',   d3.forceLink().id(d => d.id).distance(150).strength(.5))
    .force('charge', d3.forceManyBody().strength(-550))
    .force('collide',d3.forceCollide(NODE_R + 8))
    .force('cx',     d3.forceX(W / 2).strength(d => d.isCenter ? .7 : .04))
    .force('cy',     d3.forceY(H / 2).strength(d => d.isCenter ? .7 : .04));
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render() {
  // Sync datums with page state
  for (const [title, pg] of pages) {
    const d    = getDatum(title);
    d.displayTitle = pg.displayTitle;
    d.url          = pg.url;
    d.fetched      = pg.fetched;
    d.isCenter     = title === center;
  }

  const nodes = [...pages.keys()].map(getDatum);

  // Build deduplicated directed edges
  const edgeSeen = new Set();
  const links    = [];
  for (const [src, pg] of pages) {
    for (const tgt of pg.links) {
      if (!pages.has(tgt)) continue;
      const key = `${src}→${tgt}`;
      if (!edgeSeen.has(key)) { edgeSeen.add(key); links.push({ source: src, target: tgt }); }
    }
  }

  // ── Edges ──────────────────────────────────────────────────────────────────
  const edgeSel = edgeG.selectAll('line.edge')
    .data(links, d => `${d.source}→${d.target}`)
    .join('line')
    .attr('class', 'edge')
    .attr('marker-end', 'url(#arrow)');

  // ── Nodes ──────────────────────────────────────────────────────────────────
  const nodeSel = nodeG.selectAll('g.node')
    .data(nodes, d => d.id)
    .join(enter => {
      const g = enter.append('g').attr('class', 'node');
      g.append('circle').attr('r', NODE_R);
      g.append('text').attr('y', NODE_R + 12);

      g.call(d3.drag()
        .on('start', (e, d) => { if (!e.active) sim.alphaTarget(.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = d.fy = null; })
      );

      g.on('click',    (e, d) => { e.stopPropagation(); onNodeClick(d); });
      g.on('dblclick', (e, d) => { e.stopPropagation(); window.open(d.url, '_blank'); });
      g.on('mouseover', showTip);
      g.on('mousemove', moveTip);
      g.on('mouseout',  hideTip);
      return g;
    });

  // Update all (enter + update)
  nodeSel.select('circle')
    .attr('fill',         d => d.isCenter ? '#1a73e8' : d.fetched ? '#34a853' : '#bdc1c6')
    .attr('stroke',       d => d.isCenter ? '#1252aa' : d.fetched ? '#1e8e3e' : '#9aa0a6')
    .attr('stroke-width', d => d.isCenter ? 3 : 2);

  nodeSel.select('text')
    .text(d => clip(d.displayTitle, 17));

  // Refresh center forces
  sim.force('cx').strength(d => d.isCenter ? .7 : .04);
  sim.force('cy').strength(d => d.isCenter ? .7 : .04);

  sim.nodes(nodes);
  sim.force('link').links(links);
  sim.on('tick', () => {
    edgeSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x ?? W/2},${d.y ?? H/2})`);
  });
  sim.alpha(.35).restart();
}

function clip(s, n) { return s.length > n ? s.slice(0, n - 1) + '…' : s; }

// ── Tooltip ────────────────────────────────────────────────────────────────────
const tipEl   = document.getElementById('tooltip');
const wrapEl  = document.getElementById('graph-wrap');

function showTip(e, d) {
  tipEl.innerHTML =
    `<strong>${d.displayTitle}</strong><br>` +
    `<span style="opacity:.65;font-size:10px">${d.url}</span>` +
    (!d.fetched ? '<br><em style="opacity:.55">Click to expand</em>' : '');
  tipEl.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  const r = wrapEl.getBoundingClientRect();
  let x = e.clientX - r.left + 14;
  let y = e.clientY - r.top  - 10;
  if (x + 270 > W) x = e.clientX - r.left - 270;
  tipEl.style.left = x + 'px';
  tipEl.style.top  = y + 'px';
}
function hideTip() { tipEl.style.display = 'none'; }

// ── 2-level fetch centred on a title ──────────────────────────────────────────
async function explore(title) {
  center = title;
  setStatus(`Fetching "${title}"…`);
  setBusy(true);

  // Fetch centre page
  const rootData = await fetchWikiPage(title);
  if (!rootData) {
    setStatus(`Page not found or fetch failed: "${title}"`);
    setBusy(false);
    return;
  }

  const root = ensurePage(title);
  root.displayTitle = rootData.displayTitle;
  root.links        = rootData.links;
  root.fetched      = true;
  for (const t of rootData.links) ensurePage(t);

  render();
  setStatus(`Fetching ${rootData.links.length} linked pages…`);

  // Fetch level-1 children in parallel (only those not yet fetched)
  const toFetch = rootData.links.filter(t => !pages.get(t)?.fetched);
  const results = await Promise.all(toFetch.map(t => fetchWikiPage(t)));

  toFetch.forEach((t, i) => {
    const data = results[i];
    const pg   = pages.get(t);
    if (!pg || !data) return;
    pg.displayTitle = data.displayTitle;
    pg.links        = data.links;
    pg.fetched      = true;
    for (const t2 of data.links) ensurePage(t2);
  });

  render();
  setBusy(false);
  setStatus(
    `"${root.displayTitle}" · ${pages.size} nodes · ` +
    `click grey node to expand · dbl-click to open in Wikipedia`
  );
}

// ── Node click ─────────────────────────────────────────────────────────────────
async function onNodeClick(d) {
  // Always re-run explore centred on this node
  // (fetches missing children; already-fetched data stays in memory)
  await explore(d.id);
}

// ── Top-level load ─────────────────────────────────────────────────────────────
async function load() {
  const raw   = document.getElementById('url-input').value.trim();
  const inp   = document.getElementById('url-input');
  const title = parseWikiUrl(raw);

  if (!title) {
    inp.classList.add('error');
    setStatus('Please enter a valid Wikipedia URL — e.g. https://en.wikipedia.org/wiki/Python');
    return;
  }
  inp.classList.remove('error');

  // Full reset
  pages.clear();
  nodeMap.clear();
  center = null;

  initGraph();
  await explore(title);
}

function parseWikiUrl(raw) {
  try {
    const u = new URL(raw);
    if (!u.hostname.endsWith('wikipedia.org')) return null;
    const m = u.pathname.match(/^\/wiki\/(.+)/);
    return m ? decodeURIComponent(m[1]).replace(/_/g, ' ') : null;
  } catch { return null; }
}

function setStatus(msg)  { document.getElementById('status').textContent = msg; }
function setBusy(on)     { document.getElementById('go-btn').disabled = on; }

// ── Wire events ────────────────────────────────────────────────────────────────
document.getElementById('go-btn').addEventListener('click', load);
document.getElementById('url-input').addEventListener('keydown', e => {
  e.target.classList.remove('error');
  if (e.key === 'Enter') load();
});
</script>
</body>
</html>
